

name: Validate Bicep

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]


jobs:

 validate:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4

        - name: Install Bicep CLI
          run: az bicep install

        - name: Validate Bicep template
          run: az bicep build --file environments/dev/main.bicep



